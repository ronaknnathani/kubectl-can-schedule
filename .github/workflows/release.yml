name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Opens a PR against krew-index to bump the published version. This is a
      # no-op until the plugin has been accepted into krew-index for the first
      # time (that initial submission is manual), so failures here must not fail
      # the release.
      - name: Update new version in krew-index
        continue-on-error: true
        uses: rajatjindal/krew-release-bot@v0.0.51
