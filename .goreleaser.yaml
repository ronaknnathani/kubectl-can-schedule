version: 2

project_name: kubectl-can-schedule

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-can-schedule
    main: ./cmd/kubectl-can_schedule
    binary: kubectl-can_schedule
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ronaknnathani
    name: kubectl-can-schedule
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
