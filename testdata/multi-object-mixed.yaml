# A single manifest with three objects. The Deployment and StatefulSet fit, but
# the GPU Pod requests a resource type no node advertises, so the batch as a
# whole is not schedulable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web
        image: nginx
        resources:
          requests:
            cpu: "1"
            memory: 256Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: default
spec:
  replicas: 2
  serviceName: cache
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
      - name: redis
        image: redis
        resources:
          requests:
            cpu: "1"
            memory: 512Mi
      volumes: []
---
apiVersion: v1
kind: Pod
metadata:
  name: trainer
  namespace: default
spec:
  containers:
  - name: trainer
    image: busybox
    resources:
      requests:
        cpu: "2"
        nvidia.com/gpu: "2"
