apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: can-schedule
spec:
  version: v0.1.0
  homepage: https://github.com/ronaknnathani/kubectl-can-schedule
  shortDescription: "Check whether workloads fit on a cluster"
  description: |
    Reports whether one or more workloads can be scheduled on a Kubernetes
    cluster right now, by running the upstream default scheduler's filter
    plugins (PreFilter + Filter) against a live, read-only snapshot of the
    cluster. It is not a scorer or optimizer; it answers "can this land?".

    - Accepts Pod, Deployment, and StatefulSet manifests (-f, multi-doc, stdin)
      or a synthetic workload from repeatable --resource flags.
    - Shows cluster allocatable and already-allocated capacity per resource.
    - Reports, per workload, feasible node count, requested resources, how many
      replicas fit, and a concise reason when they do not.
    - Optionally simulates preemption of lower-priority pods (non-destructive).

    The tool never mutates the cluster.
  caveats: |
    This plugin requires read access to the cluster. Specifically, it needs
    permissions to list nodes, pods, priorityclasses, and storageclasses. It
    performs no writes and never evicts or deletes any object.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ronaknnathani/kubectl-can-schedule/releases/download/v0.1.0/kubectl-can-schedule_0.1.0_linux_amd64.tar.gz
      sha256: 70ddedeb52332b3a47115199a0e93cf81cd698ecf98244a3d2f6241763e12f53
      bin: kubectl-can_schedule
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ronaknnathani/kubectl-can-schedule/releases/download/v0.1.0/kubectl-can-schedule_0.1.0_linux_arm64.tar.gz
      sha256: 1bcadeae90acd304851ef302e84903ba2aa068d36b36b2e44f40557a3f9a19e3
      bin: kubectl-can_schedule
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ronaknnathani/kubectl-can-schedule/releases/download/v0.1.0/kubectl-can-schedule_0.1.0_darwin_amd64.tar.gz
      sha256: 429db61d4aeb3e46d3e3d0d4619e28a1bc6b6d217d118a67360b8dc5507dd726
      bin: kubectl-can_schedule
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ronaknnathani/kubectl-can-schedule/releases/download/v0.1.0/kubectl-can-schedule_0.1.0_darwin_arm64.tar.gz
      sha256: b466ca4d226e83643753879597d05f5d8e7645bdcb99d54a4979636bbd0ee3fc
