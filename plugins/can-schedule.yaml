      uri: https://github.com/ronaknnathani/kubectl-can-schedule/releases/download/v0.1.0/kubectl-can-schedule_0.1.0_windows_amd64.zip
      sha256: 51877466f673bf229afda7fd3429b3de15674087530d7eb48c9bb474da640e83
      bin: kubectl-can_schedule.exe
    - selector:
        matchLabels:
